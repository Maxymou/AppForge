version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: appforge
      POSTGRES_PASSWORD: appforge_secret
      POSTGRES_DB: appforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://appforge:appforge_secret@postgres:5432/appforge}
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_prod}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@appforge.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      PORT: ${PORT:-4000}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
